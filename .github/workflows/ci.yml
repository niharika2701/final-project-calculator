name: CI - Final Project

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/test_reports_unit.py -v

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: sqlite:///./test_integration.db

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run integration tests
        run: python -m pytest tests/test_reports_integration.py -v

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: sqlite:///./test_e2e.db

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright
        run: |
          pip install pytest-playwright==0.4.4
          playwright install chromium
          playwright install-deps chromium

      - name: Run E2E tests
        run: python -m pytest tests/test_calculations_e2e.py tests/test_e2e_reports.py -v

  deploy:
    name: Build and Push to Docker Hub
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: niharika2701/final-project-calculator:latest