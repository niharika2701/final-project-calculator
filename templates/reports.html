<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reports &amp; History</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            color: #1e293b;
        }

        nav {
            background: #1a1a2e;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            height: 56px;
            gap: 0.5rem;
        }
        .brand { color: #fff; font-weight: 700; font-size: 1.1rem; margin-right: auto; }
        nav a {
            color: #94a3b8;
            text-decoration: none;
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: all .15s;
        }
        nav a:hover { background: #2d2d4e; color: #fff; }
        nav a.active { background: #6366f1; color: #fff; }

        #logout-btn {
            background: #dc2626;
            color: #fff;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-left: 0.5rem;
            transition: background .15s;
        }
        #logout-btn:hover { background: #b91c1c; }

        main { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }

        h1 { color: #1a1a2e; font-size: 1.6rem; margin-bottom: 1.5rem; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 1rem;
            margin-bottom: 1.75rem;
        }
        .stat-card {
            background: #fff;
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            box-shadow: 0 1px 3px rgba(0,0,0,.07);
            text-align: center;
        }
        .stat-card .label {
            color: #64748b;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: .06em;
            margin-bottom: 0.4rem;
        }
        .stat-card .value {
            color: #1a1a2e;
            font-size: 2rem;
            font-weight: 700;
        }

        .section {
            background: #fff;
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 1px 3px rgba(0,0,0,.07);
        }
        .section h2 {
            font-size: 0.95rem;
            font-weight: 600;
            color: #1a1a2e;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 0.6rem;
            margin-bottom: 1rem;
        }

        .op-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.6rem; }
        .op-label { width: 72px; font-size: 0.85rem; color: #475569; }
        .bar-track { flex: 1; background: #e2e8f0; border-radius: 99px; height: 10px; overflow: hidden; }
        .bar-fill { background: #6366f1; border-radius: 99px; height: 10px; transition: width .5s ease; }
        .op-count { font-weight: 600; font-size: 0.85rem; min-width: 20px; text-align: right; }

        .recent-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.6rem 0;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.88rem;
        }
        .recent-item:last-child { border-bottom: none; }
        .op-badge {
            background: #ede9fe;
            color: #6d28d9;
            padding: 0.2rem 0.55rem;
            border-radius: 4px;
            font-size: 0.78rem;
            font-weight: 600;
            min-width: 68px;
            text-align: center;
        }
        .recent-expr { flex: 1; color: #1e293b; }
        .recent-result { color: #059669; font-weight: 700; }
        .recent-date { color: #94a3b8; font-size: 0.75rem; white-space: nowrap; }

        .empty-state { text-align: center; padding: 1.5rem; color: #94a3b8; font-size: 0.9rem; }
        #loading { text-align: center; padding: 3rem; color: #64748b; }
        #error-msg {
            background: #fee2e2;
            color: #991b1b;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>
<body>

<nav>
    <span class="brand">CalcApp</span>
    <a href="/calculations">Calculator</a>
    <a href="/reports" class="active">Reports</a>
    <button id="logout-btn" onclick="logout()">Logout</button>
</nav>

<main>
    <h1>Reports &amp; History</h1>

    <div id="error-msg"></div>
    <div id="loading">Loading your statistics…</div>

    <div id="report-content" style="display:none">

        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">Total Calculations</div>
                <div class="value" id="total-count">—</div>
            </div>
            <div class="stat-card">
                <div class="label">Avg Operand A</div>
                <div class="value" id="avg-a">—</div>
            </div>
            <div class="stat-card">
                <div class="label">Avg Operand B</div>
                <div class="value" id="avg-b">—</div>
            </div>
            <div class="stat-card">
                <div class="label">Avg Result</div>
                <div class="value" id="avg-result">—</div>
            </div>
        </div>

        <div class="section">
            <h2>Operations Breakdown</h2>
            <div id="ops-breakdown">
                <div class="empty-state">No calculations yet.</div>
            </div>
        </div>

        <div class="section">
            <h2>Most Recent Calculations (last 5)</h2>
            <div id="recent-list">
                <div class="empty-state">No calculations yet.</div>
            </div>
        </div>

    </div>
</main>

<script>
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/login';
    }

    async function loadReport() {
        try {
            const res = await fetch('/reports/summary', {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (res.status === 401) {
                localStorage.clear();
                window.location.href = '/login';
                return;
            }
            if (!res.ok) throw new Error(`Server returned ${res.status}`);

            const data = await res.json();
            renderReport(data);
        } catch (err) {
            showError('Failed to load report. Please try refreshing.');
        }
    }

    function renderReport(data) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('report-content').style.display = 'block';

        document.getElementById('total-count').textContent = data.total_calculations;
        document.getElementById('avg-a').textContent       = data.average_a;
        document.getElementById('avg-b').textContent       = data.average_b;
        document.getElementById('avg-result').textContent  = data.average_result;

        renderOpsBreakdown(data.by_operation);
        renderRecentList(data.most_recent);
    }

    function renderOpsBreakdown(byOp) {
        const el = document.getElementById('ops-breakdown');
        const entries = Object.entries(byOp);
        if (entries.length === 0) {
            el.innerHTML = '<div class="empty-state">No calculations yet.</div>';
            return;
        }
        const maxCount = Math.max(...entries.map(([, v]) => v));
        el.innerHTML = entries.map(([op, count]) => `
            <div class="op-row">
                <span class="op-label">${op}</span>
                <div class="bar-track">
                    <div class="bar-fill" style="width:${Math.round(count / maxCount * 100)}%"></div>
                </div>
                <span class="op-count">${count}</span>
            </div>
        `).join('');
    }

    const OP_SYMBOLS = { Add: '+', Sub: '−', Multiply: '×', Divide: '÷' };

    function renderRecentList(items) {
        const el = document.getElementById('recent-list');
        if (items.length === 0) {
            el.innerHTML = '<div class="empty-state">No calculations yet.</div>';
            return;
        }
        el.innerHTML = items.map(c => `
            <div class="recent-item">
                <span class="op-badge">${c.type}</span>
                <span class="recent-expr">${c.a} ${OP_SYMBOLS[c.type] || c.type} ${c.b}</span>
                <span class="recent-result">= ${c.result}</span>
                <span class="recent-date">${new Date(c.created_at).toLocaleString()}</span>
            </div>
        `).join('');
    }

    function showError(msg) {
        document.getElementById('loading').style.display = 'none';
        const el = document.getElementById('error-msg');
        el.textContent = msg;
        el.style.display = 'block';
    }

    function logout() {
        localStorage.clear();
        window.location.href = '/login';
    }

    loadReport();
</script>

</body>
</html>
